
services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.3
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/ > /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 30s
    networks:
      - bookshelf

  backend:
    build: ./backend-go
    init: true
    ports:
      - "3001:3001"
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - PORT=3001
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - bookshelf
    restart: unless-stopped

  # Optional: run the frontend locally (e.g. for testing without Netlify).
  # Usage: docker compose --profile localfe up
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - bookshelf
    restart: unless-stopped
    profiles:
      - localfe

  importer:
    build: ./backend-go
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - TELLICO_FILE=/data/collection.tc
      - COVERS_JSON=/data/covers.json
      - IMPORT=1
    volumes:
      - ./data:/data:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - bookshelf
    profiles:
      - import

volumes:
  es_data:

networks:
  bookshelf:
